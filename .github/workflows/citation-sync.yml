name: Citation Sync

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  check-citation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check citation versions
        run: python scripts/update_citation.py --check

